<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | 菜谱管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
</head>
<body class="admin-page bg-[#05070d] text-slate-100">
    <main class="mx-auto min-h-screen max-w-7xl px-4 py-6 sm:px-6 lg:px-10">
        <header class="flex flex-col gap-4 rounded-[28px] border border-white/10 bg-white/5 p-5 backdrop-blur sm:flex-row sm:items-end sm:justify-between sm:p-6">
            <div>
                <p class="text-xs uppercase tracking-[0.32em] text-slate-400">Recipe Admin</p>
                <h1 class="mt-3 text-3xl font-black tracking-[0.15em] text-white sm:text-4xl">菜谱库管理</h1>
            </div>
            <div class="flex gap-3">
                <a href="/" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-200">返回抽奖页</a>
                <button type="button" id="reload-list" class="rounded-full border border-emerald-300/30 bg-emerald-300/10 px-4 py-2 text-sm text-emerald-100">刷新列表</button>
            </div>
        </header>

        <section class="mt-6 grid gap-6 xl:grid-cols-[minmax(0,430px)_minmax(0,1fr)]">
            <div class="space-y-6">
                <!-- 单条录入 -->
                <div class="panel-shell rounded-[28px] border border-white/10 p-5 sm:p-6">
                    <div class="flex items-center justify-between gap-3">
                        <div>
                            <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Create Recipe</p>
                            <h2 id="form-title" class="mt-2 text-2xl font-bold text-white">新增菜谱</h2>
                        </div>
                        <div id="form-status" class="rounded-full border border-white/10 bg-black/20 px-3 py-1 text-xs text-slate-300">未提交</div>
                    </div>

                    <form id="recipe-form" class="mt-6 space-y-4">
                        <input type="hidden" id="editing_recipe_id" value="">
                        <div class="grid gap-4 sm:grid-cols-2">
                            <label class="form-block sm:col-span-2">
                                <span>菜名</span>
                                <input name="name" required maxlength="100" placeholder="例如：红烧肉">
                            </label>
                            <label class="form-block">
                                <span>分类</span>
                                <select name="category" required>
                                    <option value="荤菜">荤菜</option>
                                    <option value="素菜">素菜</option>
                                    <option value="汤">汤</option>
                                    <option value="主食">主食</option>
                                </select>
                            </label>
                            <label class="form-block">
                                <span>稀有度</span>
                                <select name="rarity" required>
                                    <option value="3">3 星</option>
                                    <option value="4">4 星</option>
                                    <option value="5">5 星</option>
                                </select>
                            </label>
                            <label class="form-block sm:col-span-2">
                                <span>食谱图片路径 / 外链</span>
                                <input name="img_url" id="img_url" required placeholder="/static/uploads/... 或 https://...">
                            </label>
                            <div class="sm:col-span-2 rounded-[22px] border border-white/10 bg-black/20 p-4">
                                <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                                    <div>
                                        <h3 class="text-sm font-semibold text-white">上传食谱图片</h3>
                                        <p class="mt-1 text-xs leading-6 text-slate-400">支持 JPG、PNG、WEBP、GIF，单张最大 5MB</p>
                                    </div>
                                    <button type="button" id="upload-image-btn" class="mini-action">上传图片</button>
                                </div>
                                <div class="mt-3 grid gap-4 lg:grid-cols-[minmax(0,1fr)_140px] lg:items-start">
                                    <label class="form-block">
                                        <span>本地图片文件</span>
                                        <input id="image_file" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
                                    </label>
                                    <div id="image-preview" class="image-preview empty">未选择图片</div>
                                </div>
                            </div>
                        </div>

                        <div class="grid gap-4 lg:grid-cols-2">
                            <div class="rounded-[22px] border border-white/10 bg-black/20 p-4">
                                <div class="flex items-center justify-between gap-3">
                                    <h3 class="text-sm font-semibold text-white">食材列表</h3>
                                    <button type="button" class="mini-action" data-add-row="ingredients">添加食材</button>
                                </div>
                                <div id="ingredients-list" class="mt-3 space-y-2"></div>
                            </div>
                            <div class="rounded-[22px] border border-white/10 bg-black/20 p-4">
                                <div class="flex items-center justify-between gap-3">
                                    <h3 class="text-sm font-semibold text-white">关键描述词</h3>
                                    <button type="button" class="mini-action" data-add-row="keywords">添加关键词</button>
                                </div>
                                <div id="keywords-list" class="mt-3 space-y-2"></div>
                            </div>
                        </div>

                        <button type="submit" class="btn-industrial btn-industrial-gold w-full rounded-[20px] px-5 py-4 text-left">
                            <span id="submit-mode-label" class="block text-xs uppercase tracking-[0.3em] text-slate-800">Submit</span>
                            <span id="submit-text" class="mt-2 block text-xl font-black text-slate-950">写入菜谱库</span>
                        </button>
                        <button type="button" id="cancel-edit-btn" class="mini-action w-full hidden">取消编辑并恢复新增模式</button>
                    </form>
                </div>

                <!-- JSON 批量导入 -->
                <div class="panel-shell rounded-[28px] border border-white/10 p-5 sm:p-6">
                    <div>
                        <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Batch Import</p>
                        <h2 class="mt-2 text-xl font-bold text-white">JSON 批量导入</h2>
                    </div>
                    <div class="mt-4 space-y-3">
                        <textarea id="batch-json" rows="8" class="w-full rounded-[16px] border border-white/12 bg-[rgba(2,6,14,0.45)] p-3 text-sm text-white font-mono" placeholder='[{"name":"红烧肉","category":"荤菜","rarity":4,"img_url":"/static/uploads/x.jpg","keywords":["家常","酱香"],"ingredients":["五花肉 500g","冰糖 30g"]}]'></textarea>
                        <div class="flex items-center justify-between gap-3">
                            <p id="batch-status" class="text-xs text-slate-500">粘贴 JSON 数组后点击导入</p>
                            <button type="button" id="batch-import-btn" class="mini-action">导入</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-shell rounded-[28px] border border-white/10 p-5 sm:p-6">
                <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
                    <div>
                        <p class="text-xs uppercase tracking-[0.3em] text-slate-500">Recipe Inventory</p>
                        <h2 class="mt-2 text-2xl font-bold text-white">当前菜谱列表</h2>
                    </div>
                    <div id="recipe-count" class="text-sm text-slate-400">加载中</div>
                </div>
                <div id="recipe-list" class="mt-5 grid gap-4 md:grid-cols-2"></div>
            </div>
        </section>
    </main>

    <template id="dynamic-row-template">
        <div class="dynamic-row flex items-center gap-2">
            <input class="flex-1" />
            <button type="button" class="mini-action mini-action-danger">删除</button>
        </div>
    </template>

    <script src="/static/admin.js" defer></script>
</body>
</html>
