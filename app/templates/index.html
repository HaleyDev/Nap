<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/site.css">
</head>
<body class="wish-page bg-[#05070d] text-slate-100">
    <canvas id="bg-canvas"></canvas>

    <!-- ===== 配置页（首屏）===== -->
    <main id="config-view" class="relative z-10 flex min-h-screen items-center justify-center px-4 py-8">
        <section class="w-full max-w-lg space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-black tracking-[0.12em] text-white sm:text-4xl">吃点什么</h1>
                <p class="mt-2 text-sm text-slate-400">从你的菜谱库里帮你挑几道灵感</p>
            </div>

            <div class="panel-shell rounded-[28px] border border-white/10 p-5 sm:p-7 space-y-5">
                <div class="grid gap-4 sm:grid-cols-2">
                    <label class="form-block text-slate-200">
                        <span>菜品类别</span>
                        <select id="wish-category" class="bg-black/20">
                            <option value="">全部分类</option>
                            {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                            {% endfor %}
                        </select>
                    </label>
                    <label class="form-block text-slate-200">
                        <span>稀有度</span>
                        <select id="wish-rarity" class="bg-black/20">
                            <option value="">不限</option>
                            <option value="5">★★★★★ 五星</option>
                            <option value="4">★★★★ 四星</option>
                            <option value="3">★★★ 三星</option>
                        </select>
                    </label>
                </div>

                <label class="form-block text-slate-200">
                    <span>关键字筛选</span>
                    <input id="wish-keyword" type="text" placeholder="输入食材或特点，如：辣、牛肉、清淡…" class="bg-black/20">
                </label>

                <label class="form-block text-slate-200">
                    <span>灵感数量</span>
                    <div class="flex items-center gap-3">
                        <input id="wish-count" type="range" min="1" max="20" value="1" class="wish-range flex-1">
                        <span id="wish-count-display" class="min-w-[2.5rem] text-center text-xl font-black text-amber-300">1</span>
                    </div>
                </label>

                <p class="text-xs text-slate-500 leading-5">按分类或关键字筛选时，只会从匹配的菜谱中抽取。拖动滑块选择想要的灵感数量。</p>

                <button type="button" id="wish-go" class="btn-industrial btn-industrial-gold w-full rounded-[20px] px-5 py-4 text-center">
                    <span class="block text-2xl font-black text-slate-950">开始抽取</span>
                </button>
            </div>

            <div class="flex items-center justify-between gap-3">
                <button type="button" id="show-recommend" class="text-sm text-slate-400 underline underline-offset-4 hover:text-slate-200 transition">随机每类推荐一道</button>
                <a href="/admin" class="text-sm text-slate-400 underline underline-offset-4 hover:text-slate-200 transition">菜谱管理</a>
            </div>

            <!-- 历史记录面板 -->
            <div id="history-panel" class="hidden">
                <div class="flex items-center justify-between gap-3">
                    <h3 class="text-sm font-semibold text-slate-300">已确认的选择</h3>
                    <button type="button" id="clear-history" class="text-xs text-slate-500 hover:text-rose-300 transition">清空记录</button>
                </div>
                <div id="history-list" class="mt-3 space-y-2"></div>
            </div>
        </section>
    </main>

    <!-- ===== 结果页（全屏）===== -->
    <div id="result-view" class="result-view hidden">
        <div class="result-view-inner">
            <div class="flex items-center justify-between gap-3 px-4 pt-6 sm:px-8">
                <div>
                    <p class="text-xs uppercase tracking-[0.28em] text-slate-500">Results</p>
                    <h2 class="mt-1 text-xl font-bold text-white sm:text-2xl">灵感结果</h2>
                </div>
                <div class="flex items-center gap-3">
                    <span id="result-count" class="text-sm text-slate-400">0 道</span>
                    <button type="button" id="confirm-selection" class="rounded-full border border-emerald-300/30 bg-emerald-300/10 px-4 py-2 text-sm font-semibold text-emerald-100 transition hover:bg-emerald-300/20">确认选择</button>
                    <button type="button" id="back-to-config" class="rounded-full border border-white/10 px-4 py-2 text-sm text-slate-200 transition hover:bg-white/5">返回</button>
                </div>
            </div>

            <div id="cards-wrapper" class="mt-5 flex flex-wrap justify-center gap-5 px-4 pb-10 sm:px-8"></div>
        </div>
    </div>

    <!-- ===== Loading ===== -->
    <div id="loading-overlay" class="overlay hidden">
        <div class="meteor-layer">
            <div class="meteor-core"></div>
            <div class="meteor-tail"></div>
        </div>
    </div>

    <!-- ===== Detail Modal ===== -->
    <div id="detail-modal" class="modal-shell hidden">
        <div class="modal-card">
            <button type="button" id="close-modal" class="absolute right-4 top-4 z-20 rounded-full border border-white/10 bg-black/30 px-3 py-2 text-xs text-white">关闭</button>
            <div id="detail-hero" class="detail-hero"></div>
            <div class="space-y-5 p-5 sm:p-6">
                <div>
                    <div id="detail-rarity" class="flex gap-1 text-xl"></div>
                    <h3 id="detail-title" class="mt-3 text-2xl font-black text-white sm:text-3xl"></h3>
                    <p id="detail-category" class="mt-2 text-sm uppercase tracking-[0.28em] text-slate-400"></p>
                </div>
                <div>
                    <h4 class="section-title">关键词</h4>
                    <div id="detail-keywords" class="mt-3 flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <h4 class="section-title">食材</h4>
                    <div id="detail-ingredients" class="mt-3 flex flex-wrap gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== Card Template ===== -->
    <template id="card-template">
        <article class="wish-card-shell">
            <button type="button" class="wish-card group relative h-[360px] w-full cursor-pointer rounded-[24px] bg-transparent text-left sm:h-[420px]">
                <span class="wish-card-face wish-card-back"></span>
                <span class="wish-card-face wish-card-front">
                    <span class="wish-card-gloss"></span>
                    <span class="relative z-10 mt-auto block p-4">
                        <span data-category class="inline-flex rounded-full bg-black/30 px-2 py-1 text-[11px] uppercase tracking-[0.2em] text-slate-200"></span>
                        <span data-name class="mt-3 block text-xl font-black text-white"></span>
                        <span data-rarity class="mt-2 block"></span>
                    </span>
                </span>
            </button>
        </article>
    </template>

    <script src="/static/wish.js" defer></script>
</body>
</html>
